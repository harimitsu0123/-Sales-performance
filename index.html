<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業績ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f1;--surface:#fff;--surface2:#eeecea;--surface3:#e4e2de;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);
  --text:#18180f;--text2:#5a5950;--text3:#97958e;
  --green:#1a9e72;--green-bg:#e2f5ee;
  --red:#e04444;--red-bg:#fdecec;
  --amber:#b87215;--amber-bg:#faeeda;
  --blue:#3278cc;--radius:10px;--radius-sm:6px;
}
body{font-family:'Helvetica Neue','Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:0.5px solid var(--border2);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:4px}
.sidebar-logo{font-size:15px;font-weight:700;letter-spacing:-.02em;margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border)}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;width:100%;text-align:left;transition:background .15s,color .15s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface3);color:var(--text);font-weight:600}
.sidebar-footer{margin-top:auto;font-size:11px;color:var(--text3);padding-top:1rem;border-top:0.5px solid var(--border)}
.main{flex:1;overflow:auto;padding:2rem}
.page{display:none}.page.active{display:block}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
.upload-area{border:2px dashed var(--border2);border-radius:var(--radius);padding:2.5rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--surface)}
.upload-area:hover,.upload-area.dragover{border-color:var(--blue);background:#f0f5ff}
.upload-area input{display:none}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-text{font-size:14px;font-weight:500;color:var(--text2)}
.upload-sub{font-size:12px;color:var(--text3);margin-top:4px}
.month-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem;align-items:center}
.month-chip{padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.month-chip:hover{border-color:var(--blue);color:var(--blue)}
.month-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.month-label{font-size:12px;color:var(--text3);margin-right:4px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem}
.metric-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:5px}
.metric-value{font-size:20px;font-weight:700;letter-spacing:-.02em}
.metric-value small{font-size:13px;font-weight:400}
.metric-sub{font-size:11px;margin-top:3px}
.up{color:var(--green)}.down{color:var(--red)}.neutral{color:var(--text3)}
.view-tabs{display:flex;border-bottom:1px solid var(--border2);margin-bottom:1.5rem}
.view-tab{padding:8px 20px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.view-tab:hover{color:var(--text)}.view-tab.active{color:var(--text);border-bottom-color:var(--text)}
.view-section{display:none}.view-section.active{display:block}
.chart-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.chart-title{font-size:13px;font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--text2)}
.legend span{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.chart-wrap{position:relative;width:100%}
.table-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:1.5rem}
.table-card .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-head-bar{padding:12px 14px;border-bottom:0.5px solid var(--border2);font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:right;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text3);background:var(--surface2);border-bottom:0.5px solid var(--border2);white-space:nowrap}
thead th.col-brand{text-align:left;position:sticky;left:0;z-index:2;background:var(--surface2)}
thead th.col-month-label{text-align:center;border-left:2px solid var(--border2);color:var(--text);background:var(--surface3)}
tbody td{text-align:right;padding:8px 12px;border-bottom:0.5px solid var(--border);white-space:nowrap}
tbody td.col-brand{text-align:left;font-weight:500;position:sticky;left:0;z-index:1;background:var(--surface)}
tbody tr.row-total td{font-weight:700;background:var(--surface2)}
tbody tr.row-total td.col-brand{background:var(--surface2)}
tbody td.col-sep{border-left:2px solid var(--border2)}
thead th:not(:first-child){text-align:right}
tbody td{padding:10px 14px;border-bottom:0.5px solid var(--border);white-space:nowrap}
tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
tbody tr:last-child td{border-bottom:none;font-weight:600;background:var(--surface2)}
tbody tr:hover:not(:last-child){background:#faf9f7}
.progress-bar{width:56px;height:5px;background:rgba(0,0,0,0.08);border-radius:3px;display:inline-block;vertical-align:middle;margin-right:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-state .emoji{font-size:40px;margin-bottom:1rem}
.brand-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;align-items:center}
.brand-chip{padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.brand-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem}
.log-item{padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
@media(max-width:700px){.grid-2{grid-template-columns:1fr}.sidebar{width:100%;flex-direction:row;padding:.75rem 1rem;overflow-x:auto}.sidebar-logo{display:none}.sidebar-footer{display:none}.nav-btn{white-space:nowrap}}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="sidebar-logo">📊 業績ダッシュボード</div>
  <button class="nav-btn active" onclick="showPage('overview',this)">📋 月次サマリー</button>
  <button class="nav-btn" onclick="showPage('allmonths',this)">📅 全月一覧</button>
  <button class="nav-btn" onclick="showPage('trend',this)">📈 月次推移</button>
  <button class="nav-btn" onclick="showPage('brand',this)">🏷️ ブランド分析</button>
  <button class="nav-btn" onclick="showPage('upload',this)">📁 データ管理</button>
  <div class="sidebar-footer" id="data-status">データなし</div>
</nav>
<div class="main">

<!-- 月次サマリー -->
<div id="page-overview" class="page active">
  <div class="topbar">
    <div class="page-title">月次サマリー</div>
    <span id="overview-month-label" style="font-size:13px;color:var(--text3)"></span>
  </div>
  <div class="month-bar" id="overview-month-bar"><span class="month-label">表示月：</span></div>
  <div id="overview-content"><div class="empty-state"><div class="emoji">📊</div><p style="color:var(--text3)">データ読み込み中...</p></div></div>
</div>

<!-- 月次推移 -->
<div id="page-trend" class="page">
  <div class="topbar"><div class="page-title">月次推移</div></div>
  <div id="trend-year-bar" class="month-bar"></div>
  <div id="trend-brand-filter" class="brand-filter"></div>
  <div id="trend-content"><div class="empty-state"><div class="emoji">📈</div><p style="color:var(--text3)">データ読み込み中...</p></div></div>
</div>

<!-- ブランド分析 -->
<div id="page-brand" class="page">
  <div class="topbar"><div class="page-title">ブランド分析</div></div>
  <div id="brand-content"><div class="empty-state"><div class="emoji">🏷️</div><p style="color:var(--text3)">データ読み込み中...</p></div></div>
</div>

<!-- 全月一覧 -->
<div id="page-allmonths" class="page">
  <div class="topbar"><div class="page-title">全月一覧</div></div>
  <div id="allmonths-content"><div class="empty-state"><div class="emoji">📅</div><p style="color:var(--text3)">データなし</p></div></div>
</div>

<!-- データ管理 -->
<div id="page-upload" class="page">
  <div class="topbar"><div class="page-title">データ管理</div></div>
  <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept=".xlsx,.xls" multiple>
    <div class="upload-icon">📁</div>
    <div class="upload-text">Excelファイルをドラッグ＆ドロップ</div>
    <div class="upload-sub">または クリックして選択（.xlsx / .xls）· 複数ファイル同時対応</div>
  </div>
  <div id="upload-log" style="margin-top:1rem"></div>
  <div id="data-list" style="margin-top:1.5rem"></div>
  <!-- GitHub設定 -->
  <div style="margin-top:1.5rem;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:16px 18px">
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">☁️ クラウド同期設定</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">設定するとExcelアップロード時に自動でクラウドに保存→全員が同じデータを見られます</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="token-input" type="password" placeholder="GitHubトークンを入力（ghp_...）"
        style="flex:1;min-width:200px;padding:8px 12px;border:0.5px solid var(--border2);border-radius:6px;font-size:13px;background:var(--surface)"
        value="">
      <button onclick="saveToken()" style="padding:8px 16px;border-radius:6px;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600">保存</button>
      <button onclick="clearToken()" style="padding:8px 12px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:13px">削除</button>
    </div>
    <div id="token-status" style="font-size:11px;margin-top:8px"></div>
  </div>
  <div style="margin-top:1rem">
    <button onclick="clearAllData()" style="padding:8px 18px;border-radius:6px;border:1px solid var(--red);color:var(--red);background:transparent;cursor:pointer;font-size:13px;">🗑 全データをクリア</button>
    <span style="font-size:11px;color:var(--text3);margin-left:10px">ブラウザに保存されたデータを削除します</span>
  </div>
</div>

</div>
</div>

<script>
const STORAGE_KEY='gyoseki_allData_v1';
function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(allData));}catch(e){}
  updateDataStatus();
}
function updateDataStatus(state){
  const el=document.getElementById('data-status');
  if(!el)return;
  const n=Object.keys(allData).length;
  if(n===0){el.innerHTML='データなし';el.style.color='';}
  else{
    const latest=Object.keys(allData).sort().pop();
    const syncIcon=getToken()?(state==='pushed'?'☁️ 同期済み':'☁️ 同期中...'):'💾 ローカルのみ';
    el.innerHTML=`✅ ${n}ヶ月分<br><span style="font-size:10px">最新: ${allData[latest].label}</span><br><span style="font-size:10px">${syncIcon}</span>`;
    el.style.color='var(--green)';
  }
}
const REPO='harimitsu0123/-Sales-performance';
const DATA_FILE='data.json';
const RAW_URL=`https://raw.githubusercontent.com/${REPO}/main/${DATA_FILE}`;
const API_URL=`https://api.github.com/repos/${REPO}/contents/${DATA_FILE}`;
const TOKEN_KEY='gh_token_v1';

function getToken(){return localStorage.getItem(TOKEN_KEY)||'';}
function setToken(t){if(t)localStorage.setItem(TOKEN_KEY,t);else localStorage.removeItem(TOKEN_KEY);}

async function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(allData));}catch(e){}
  updateDataStatus();
  const token=getToken();
  if(!token)return;
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(allData))));
    // 既存ファイルのSHAを取得
    let sha=null;
    try{const r=await fetch(API_URL,{headers:{'Authorization':'token '+token}});if(r.ok){const d=await r.json();sha=d.sha;}}catch(e){}
    const body={message:'Update data',content};
    if(sha)body.sha=sha;
    await fetch(API_URL,{method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    updateDataStatus('pushed');
  }catch(e){console.error('GitHub push failed',e);}
}

async function loadFromGitHub(){
  try{
    const r=await fetch(RAW_URL+'?t='+Date.now());
    if(!r.ok)return false;
    const d=await r.json();
    if(d&&typeof d==='object'&&Object.keys(d).length>0){
      allData=d;selectedMonth=Object.keys(d).sort().pop()||null;
      return true;
    }
  }catch(e){}
  return false;
}

function loadData(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)allData=JSON.parse(s);}catch(e){}}
let allData={};
loadData();
let selectedMonth=Object.keys(allData).sort().pop()||null;
let activeTrendBrands=new Set();

// GitHubから最新データを取得してページ起動
(async()=>{
  const ok=await loadFromGitHub();
  if(ok){saveData();renderAll();}
  updateDataStatus();
})();
const COLORS=['#3278cc','#1a9e72','#e8963a','#9b5de5','#e04444','#0bb4b4','#b87215','#e84393','#00b4d8'];
// ブランド一覧をデータから動的に取得（総合計を除く）
function getBrands(){
  const seen=new Set();
  Object.values(allData).forEach(d=>[...d.tangetsu,...d.ruikei].forEach(r=>{
    if(!r.name.includes('総'))seen.add(r.name);
  }));
  return [...seen];
}
// 後方互換用（固定リストが必要な箇所で使用）
const BRANDS_FALLBACK=['ハリミツ','BORIJIN','墨族','蛸墨族','MAG','山波','OEM','その他'];
// ブランド名の表記揺れを統一
function normBrand(name){
  if(!name)return name;
  if(/^BOR[IJ]{1,2}N$/i.test(name))return'BORIJIN';
  return name;
}

const fmt=n=>n==null?'—':Math.round(n).toLocaleString('ja-JP');
const achC=a=>a==null?'var(--text3)':a>=100?'var(--green)':a>=80?'var(--amber)':'var(--red)';
const yoyC=y=>y==null?'var(--text3)':y>=100?'var(--green)':'var(--red)';
const gapC=g=>g==null?'var(--text3)':g>=0?'var(--green)':'var(--red)';
const gapS=g=>g==null?'—':(g>=0?'+':'')+fmt(g);
// datalabelsプラグインをグローバル登録（デフォルトはオフ）
if(window.ChartDataLabels){
  Chart.register(ChartDataLabels);
  Chart.defaults.plugins.datalabels.display=false;
}

// 数値を短縮表示（例: 1,234,567 → 123万）
const fmtShort=n=>{
  if(n==null)return'';
  const a=Math.abs(n);
  if(a>=1000000)return(n/1000000).toFixed(1)+'M';
  if(a>=10000)return Math.round(n/10000)+'万';
  if(a>=1000)return Math.round(n/1000)+'千';
  return String(Math.round(n));
};

let charts={};
function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function mc(id,cfg){dc(id);charts[id]=new Chart(document.getElementById(id),cfg);return charts[id];}

// PARSE EXCEL
function parseExcel(buf,fname){
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  const monthKey=detectMonth(rows,fname);
  let ti=-1,ri=-1;
  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    if(r.some(c=>String(c||'').includes('単月')))ti=i;
    if(r.some(c=>String(c||'').includes('累計')))ri=i;
  }
  if(ti<0)ti=1;
  if(ri<0)ri=Math.floor(rows.length/2)+1;
  return{monthKey,label:mlabel(monthKey),tangetsu:parseSection(rows,ti+1,ri),ruikei:parseSection(rows,ri+1,rows.length)};
}

function detectMonth(rows,fname){
  const m=fname.match(/(\d{4})[-_]?(\d{1,2})|(\d{1,2})月/);
  if(m){
    if(m[1]&&m[2])return m[1]+'-'+String(m[2]).padStart(2,'0');
    if(m[3])return'2026-'+String(m[3]).padStart(2,'0');
  }
  for(const c of(rows[0]||[])){
    if(typeof c==='number'&&c>40000&&c<60000){
      const d=XLSX.SSF.parse_date_code(c);
      return d.y+'-'+String(d.m).padStart(2,'0');
    }
  }
  return'2026-05';
}
const mlabel=k=>{const p=k.split('-');return parseInt(p[1])+'月';};
const toN=v=>(v===null||v===''||v===undefined)?null:Number(v);

function parseSection(rows,start,end){
  const res=[];
  for(let i=start;i<end;i++){
    const r=rows[i];
    if(!r||r.every(c=>c==null))break;
    const name=normBrand(String(r[1]||r[0]||'').trim());
    if(!name)continue;
    const y5=toN(r[2]),y6=toN(r[3]),yoy=toN(r[4]),tgt=toN(r[5]),ach=toN(r[6]),gap=toN(r[7]);
    if(y5==null&&y6==null)continue;
    res.push({name,y2025:y5?Math.round(y5):0,y2026:y6?Math.round(y6):0,
      target:tgt?Math.round(tgt):null,yoy:yoy!=null?yoy*100:null,
      ach:ach!=null?ach*100:null,gap:gap!=null?Math.round(gap):null});
  }
  return res;
}

// UPLOAD
const dz=document.getElementById('drop-zone'),fi=document.getElementById('file-input');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',()=>handleFiles(fi.files));

function handleFiles(files){
  Array.from(files).forEach(async f=>{
    const r=new FileReader();
    r.onload=async e=>{
      try{
        const months=parseAllExcel(new Uint8Array(e.target.result));
        const keys=Object.keys(months);
        if(keys.length>0){
          keys.forEach(k=>{allData[k]=months[k];});
          selectedMonth=keys[keys.length-1];
          await saveData();
          addLog(f.name,keys.length+'ヶ月分のデータを読み込みました',true);
          renderAll();
        } else {
          // 旧形式フォールバック
          const d=parseExcel(new Uint8Array(e.target.result),f.name);
          allData[d.monthKey]=d;selectedMonth=d.monthKey;
          addLog(f.name,d.monthKey,true);renderAll();
        }
      }catch(err){addLog(f.name,null,false,err.message);}
    };
    r.readAsArrayBuffer(f);
  });
}

function addSonotaRow(section){
  const tot=section.find(r=>r.name.includes('総'));
  if(!tot)return;
  const brands=section.filter(r=>!r.name.includes('総'));
  const sum25=brands.reduce((s,r)=>s+(r.y2025||0),0);
  const sum26=brands.reduce((s,r)=>s+(r.y2026||0),0);
  const diff25=Math.round((tot.y2025||0)-sum25);
  const diff26=Math.round((tot.y2026||0)-sum26);
  if(Math.abs(diff26)>100){
    const yoy=diff25>0&&diff26!=null?diff26/diff25*100:null;
    section.splice(section.indexOf(tot),0,{name:'その他',y2025:diff25,y2026:diff26,target:null,yoy,ach:null,gap:null});
  }
}

function parseAllExcel(buf){
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  const result={};
  const blocks=[];
  // 月ヘッダー行を検索（col Bが空、col Cが "1/末" 等）
  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    if(!r)continue;
    const c1=String(r[1]||'').trim();
    const c2=String(r[2]||'').trim();
    if(!c1&&c2&&/^\d+\//.test(c2))blocks.push({row:i,label:c2});
  }
  // 年なしラベルの年を前後の文脈から推定
  let inferYear=2026,prevMonth=null;
  const resolvedKeys=blocks.map((b,bi)=>{
    const m4=b.label.match(/^(\d{4})\/(\d{1,2})\//);
    if(m4){
      inferYear=parseInt(m4[1]);prevMonth=parseInt(m4[2]);
      return m4[1]+'-'+String(m4[2]).padStart(2,'0');
    }
    const m=b.label.match(/^(\d{1,2})\//);
    const mo=m?parseInt(m[1]):bi+1;
    if(prevMonth!==null&&mo<=prevMonth)inferYear++;
    prevMonth=mo;
    return inferYear+'-'+String(mo).padStart(2,'0');
  });

  for(let bi=0;bi<blocks.length;bi++){
    const blockStart=blocks[bi].row;
    const blockEnd=bi+1<blocks.length?blocks[bi+1].row:rows.length;
    const label=blocks[bi].label;
    const monthKey=resolvedKeys[bi];
    let tanStart=-1,ruiStart=-1;
    for(let i=blockStart;i<blockEnd;i++){
      const c2=String(rows[i]?.[2]||'').trim();
      if(c2.includes('単月')&&tanStart<0)tanStart=i;
      if(c2.includes('累計')&&ruiStart<0)ruiStart=i;
    }
    const tanEnd=ruiStart>=0?ruiStart:blockEnd;
    const tangetsu=tanStart>=0?parseSection(rows,tanStart+2,tanEnd):[];
    const ruikei=ruiStart>=0?parseSection(rows,ruiStart+2,blockEnd):[];
    if(tangetsu.length>0||ruikei.length>0){
      // monthKeyから表示名を生成（例: 2025-12 → "2025/12月末", 2026-01 → "1月末"）
      const [ky,km]=monthKey.split('-');
      const dispLabel=parseInt(ky)===2026?parseInt(km)+'月末':ky+'/'+parseInt(km)+'月末';
      result[monthKey]={monthKey,label:dispLabel,tangetsu,ruikei};
    }
  }
  return result;
}

function labelToKey(label,idx){
  // "2025/11/末" のような 年/月/... 形式
  const m4=label.match(/^(\d{4})\/(\d{1,2})\//);
  if(m4)return m4[1]+'-'+String(m4[2]).padStart(2,'0');
  // "1/末" のような 月/... 形式（2026年と仮定）
  const m=label.match(/^(\d{1,2})\//);
  return m?'2026-'+String(m[1]).padStart(2,'0'):'2026-'+String(idx).padStart(2,'0');
}
function labelToDisp(label){
  // "2025/11/末" 形式
  const m4=label.match(/^(\d{4})\/(\d{1,2})\/(.+)/);
  if(m4)return m4[1]+'/'+m4[2]+'月'+(m4[3]==='末'?'末':'/'+m4[3]);
  // "1/末" 形式
  const m=label.match(/^(\d{1,2})\/(.+)/);
  if(!m)return label;
  return m[2]==='末'?m[1]+'月末':m[1]+'月/'+m[2];
}

  }
  if(curRui?.yoy!=null){
    const icon=curRui.yoy>=100?'📈':'📉';

      text:`${icon} 累計 総合計は前年比 <strong>${curRui.yoy.toFixed(1)}%</strong>（${fmt(curRui.y2025)}円 → ${fmt(curRui.y2026)}円）`});

  const yoyOver=brands.filter(r=>r.yoy>=120).sort((a,b)=>b.yoy-a.yoy);

}

function ovSection(data,label,pfx){
  const tot=data.find(r=>r.name.includes('総'))||data[data.length-1]||{};
  const ac=tot.ach!=null?tot.ach.toFixed(1)+'%':'—';
  const acCls=tot.ach==null?'neutral':tot.ach>=100?'up':'down';
  const yv=tot.yoy!=null?tot.yoy.toFixed(1)+'%':'—';
  const yCls=tot.yoy==null?'neutral':tot.yoy>=100?'up':'down';
  const gv=tot.gap!=null?(tot.gap>=0?'▲ +':'▼ ')+fmt(tot.gap)+'円':'—';
  const gCls=tot.gap==null?'neutral':tot.gap>=0?'up':'down';
  return`<div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-bottom:1.5rem">
    <div class="metric-card"><div class="metric-label">2026年 ${label}売上</div><div class="metric-value" style="white-space:nowrap">${fmt(tot.y2026)}<small>円</small></div><div class="metric-sub ${yCls}">前年比 ${yv}</div></div>
    <div class="metric-card"><div class="metric-label">前年比</div><div class="metric-value ${yCls}">${yv}</div><div class="metric-sub neutral">&nbsp;</div></div>
    <div class="metric-card"><div class="metric-label">達成率</div><div class="metric-value ${acCls}">${ac}</div><div class="metric-sub ${gCls}">${gv}</div></div>
  </div>
  <div class="chart-card">
    <div class="chart-head"><span class="chart-title">ブランド別 ${label}売上</span>
      <div class="legend"><span><span class="legend-dot" style="background:#b0cff5"></span>2025年</span><span><span class="legend-dot" style="background:#52c89a"></span>2026年</span><span><span class="legend-dot" style="background:#bbb"></span>目標</span></div>
    </div>
    <div class="chart-wrap" style="height:230px"><canvas id="${pfx}-chart"></canvas></div>
  </div>
  <div class="table-card"><table>
    <thead><tr><th class="col-brand">区分</th><th>2025年</th><th>2026年</th><th>前年比</th><th>目標</th><th>達成率</th><th>過不足</th></tr></thead>
    <tbody>${tableRows(data)}</tbody>
  </table></div>`;
}

function tableRows(data){
  return data.map(r=>{
    const fp=r.ach?Math.min(r.ach,115):0;
    const fc=r.ach==null?'#ccc':r.ach>=100?'#1a9e72':r.ach>=80?'#b87215':'#e04444';
    return`<tr><td class="col-brand">${r.name}</td><td>${fmt(r.y2025)}</td><td style="font-weight:700">${fmt(r.y2026)}</td>
    <td style="color:${yoyC(r.yoy)}">${r.yoy!=null?r.yoy.toFixed(1)+'%':'—'}</td>
    <td>${fmt(r.target)}</td>
    <td><span class="progress-bar"><span class="progress-fill" style="width:${fp}%;background:${fc}"></span></span><span style="color:${achC(r.ach)}">${r.ach!=null?r.ach.toFixed(1)+'%':'—'}</span></td>
    <td style="color:${gapC(r.gap)}">${gapS(r.gap)}</td></tr>`;
  }).join('');
}

function drawOvChart(id,data){
  const el=document.getElementById(id);if(!el)return;
  // 重複除去
  const seen=new Set();data=data.filter(r=>{if(seen.has(r.name))return false;seen.add(r.name);return true;});
  const dlBar={datalabels:{display:true,anchor:'end',align:'end',formatter:fmtShort,font:{size:10},color:'#5a5950'}};
  mc(id,{type:'bar',data:{labels:data.map(d=>d.name),datasets:[
    {label:'2025年',data:data.map(d=>d.y2025),backgroundColor:'#b0cff5',borderRadius:3},
    {label:'2026年',data:data.map(d=>d.y2026),backgroundColor:'#52c89a',borderRadius:3},
    {label:'目標',data:data.map(d=>d.target),type:'line',borderColor:'#bbb',borderWidth:1.5,borderDash:[4,3],pointRadius:3,pointBackgroundColor:'#bbb',backgroundColor:'transparent',tension:0,datalabels:{display:false}}
  ]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+(c.raw||0).toLocaleString('ja-JP')+'円'}},...dlBar},
    scales:{y:{ticks:{callback:v=>v.toLocaleString('ja-JP'),font:{size:11},color:'#97958e'},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:12},color:'#5a5950'},grid:{display:false}}}}});
}

// TREND
function renderTrend(){
  const el=document.getElementById('trend-content');
  const allMonths=sortedMonths();
  if(!allMonths.length){el.innerHTML='<div class="empty-state"><div class="emoji">📈</div><p style="color:var(--text3)">データなし</p></div>';renderTrendFilter([]);return;}

  // 年タブ
  const years=[...new Set(allMonths.map(k=>k.split('-')[0]))].sort();
  if(!window._trendYear||!years.includes(window._trendYear))window._trendYear=years[years.length-1];
  const ybar=document.getElementById('trend-year-bar');
  if(ybar){
    ybar.innerHTML='<span class="month-label">年：</span>'+
      years.map(y=>`<button class="month-chip${y===window._trendYear?' active':''}" onclick="window._trendYear='${y}';renderTrend()">${y}年</button>`).join('');
  }
  const months=allMonths.filter(k=>k.startsWith(window._trendYear));
  const BRANDS=getBrands();
  renderTrendFilter(BRANDS);
  const active=activeTrendBrands.size>0?[...activeTrendBrands]:BRANDS.slice(0,5);
  const labels=months.map(k=>allData[k].label);
  const t6=months.map(k=>(allData[k].tangetsu.find(r=>r.name.includes('総'))||{}).y2026||0);
  const t5=months.map(k=>(allData[k].tangetsu.find(r=>r.name.includes('総'))||{}).y2025||0);
  const tAch=months.map(k=>(allData[k].tangetsu.find(r=>r.name.includes('総'))||{}).ach||null);
  const rAch=months.map(k=>(allData[k].ruikei.find(r=>r.name.includes('総'))||{}).ach||null);
  const topts=unit=>({responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:10}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+(c.raw!=null?c.raw.toLocaleString('ja-JP')+unit:'—')}},datalabels:{display:false}},
    scales:{y:{ticks:{callback:v=>v.toLocaleString('ja-JP')+unit,font:{size:11},color:'#97958e'},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:12},color:'#5a5950'},grid:{display:false}}}});

  // 累計データ
  const r6=months.map(k=>(allData[k].ruikei.find(r=>r.name.includes('総'))||{}).y2026||0);
  const r5=months.map(k=>(allData[k].ruikei.find(r=>r.name.includes('総'))||{}).y2025||0);

  let h=`<div class="grid-2">
    <div class="chart-card"><div class="chart-head"><span class="chart-title">単月売上推移（総合計）</span><div class="legend"><span><span class="legend-dot" style="background:#b0cff5"></span>2025年</span><span><span class="legend-dot" style="background:#52c89a"></span>2026年</span></div></div><div class="chart-wrap" style="height:200px"><canvas id="tr-total"></canvas></div></div>
    <div class="chart-card"><div class="chart-head"><span class="chart-title">累計売上推移（総合計）</span><div class="legend"><span><span class="legend-dot" style="background:#c4b0f5"></span>2025年</span><span><span class="legend-dot" style="background:#3278cc"></span>2026年</span></div></div><div class="chart-wrap" style="height:200px"><canvas id="tr-ruikei"></canvas></div></div>
  </div>
  <div class="grid-2">
    <div class="chart-card"><div class="chart-head"><span class="chart-title">達成率推移（総合計）</span><div class="legend"><span><span class="legend-dot" style="background:#3278cc"></span>単月</span><span><span class="legend-dot" style="background:#e8963a"></span>累計</span></div></div><div class="chart-wrap" style="height:200px"><canvas id="tr-ach"></canvas></div></div>
    <div class="chart-card"><div class="chart-head"><span class="chart-title">前年比推移（単月）</span></div><div class="chart-wrap" style="height:200px"><canvas id="tr-yoy"></canvas></div></div>
  </div>
  <div class="chart-card"><div class="chart-head"><span class="chart-title">ブランド別 単月売上推移（2025年 vs 2026年）</span></div><div class="chart-wrap" style="height:260px"><canvas id="tr-brand"></canvas></div></div>
  <div class="chart-card"><div class="chart-head"><span class="chart-title">ブランド別 累計売上推移（2025年 vs 2026年）</span></div><div class="chart-wrap" style="height:260px"><canvas id="tr-brand-rui"></canvas></div></div>`;

  // 共通テーブル生成関数
  function makeTable(title, dataKey) {
    let t=`<div class="table-card"><div class="table-head-bar">${title}</div><div class="table-scroll"><table>`;
    // ヘッダー行1: 月ラベル（月ごとに結合）
    t+=`<thead><tr><th class="col-brand" rowspan="2">区分</th>`;
    t+=months.map(k=>`<th class="col-month-label" colspan="4">${allData[k].label}</th>`).join('');
    t+=`</tr><tr>`;
    t+=months.map(()=>`<th class="col-sep" style="text-align:right">2025年</th><th style="text-align:right;color:var(--green)">2026年</th><th>前年比</th><th>達成率</th>`).join('');
    t+=`</tr></thead><tbody>`;
    [...getBrands(),'総合計'].forEach(b=>{
      const rowData=months.map(k=>allData[k][dataKey].find(r=>r.name===b));
      if(!rowData.some(r=>r&&r.y2026>0))return;
      const isTot=b.includes('総');
      t+=`<tr class="${isTot?'row-total':''}"><td class="col-brand">${b}</td>`;
      t+=rowData.map(r=>{
        if(!r)return`<td class="col-sep">—</td><td>—</td><td>—</td><td>—</td>`;
        const yoyC=r.yoy==null?'':r.yoy>=100?'color:var(--green)':'color:var(--red)';
        const achC=r.ach==null?'':r.ach>=100?'color:var(--green)':r.ach>=80?'color:var(--amber)':'color:var(--red)';
        return`<td class="col-sep" style="color:var(--text3)">${fmt(r.y2025)}</td><td style="font-weight:600">${fmt(r.y2026)}</td><td style="${yoyC}">${r.yoy!=null?r.yoy.toFixed(1)+'%':'—'}</td><td style="${achC}">${r.ach!=null?r.ach.toFixed(1)+'%':'—'}</td>`;
      }).join('');
      t+=`</tr>`;
    });
    t+=`</tbody></table></div></div>`;
    return t;
  }
  h+=makeTable('単月一覧（円・2026年）','tangetsu');
  h+=makeTable('累計一覧（円・2026年）','ruikei');

  el.innerHTML=h;

  mc('tr-total',{type:'bar',data:{labels,datasets:[{label:'2025年',data:t5,backgroundColor:'#b0cff5',borderRadius:3},{label:'2026年',data:t6,backgroundColor:'#52c89a',borderRadius:3}]},options:topts('円')});
  mc('tr-ruikei',{type:'bar',data:{labels,datasets:[{label:'2025年',data:r5,backgroundColor:'#c4b0f5',borderRadius:3},{label:'2026年',data:r6,backgroundColor:'#3278cc',borderRadius:3}]},options:topts('円')});
  mc('tr-ach',{type:'line',data:{labels,datasets:[
    {label:'単月達成率',data:tAch,borderColor:'#3278cc',backgroundColor:'rgba(50,120,204,0.1)',tension:.3,fill:true,pointRadius:4},
    {label:'累計達成率',data:rAch,borderColor:'#e8963a',backgroundColor:'transparent',tension:.3,fill:false,pointRadius:4,borderDash:[4,3]}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:10}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+(c.raw!=null?c.raw.toFixed(1)+'%':'—')}},datalabels:{display:false}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:11},color:'#97958e'},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:12}},grid:{display:false}}}}});
  const yds=active.map((b,i)=>({label:b,data:months.map(k=>{const r=allData[k].tangetsu.find(row=>row.name===b);return r&&r.yoy!=null?r.yoy:null;}),borderColor:COLORS[i%7],backgroundColor:'transparent',tension:.3,fill:false,pointRadius:4}));
  mc('tr-yoy',{type:'line',data:{labels,datasets:yds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:10}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+(c.raw!=null?c.raw.toFixed(1)+'%':'—')}},datalabels:{display:false}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:11},color:'#97958e'},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:12}},grid:{display:false}}}}});
  // 単月ブランド別（2025 vs 2026）
  const bds=active.flatMap((b,i)=>[
    {label:b+' 2025',data:months.map(k=>{const r=allData[k].tangetsu.find(row=>row.name===b);return r?r.y2025:null;}),borderColor:COLORS[i%7],backgroundColor:'transparent',tension:.3,fill:false,pointRadius:3,borderDash:[4,3],borderWidth:1.5},
    {label:b+' 2026',data:months.map(k=>{const r=allData[k].tangetsu.find(row=>row.name===b);return r?r.y2026:null;}),borderColor:COLORS[i%7],backgroundColor:'transparent',tension:.3,fill:false,pointRadius:4,borderWidth:2.5}
  ]);
  mc('tr-brand',{type:'line',data:{labels,datasets:bds},options:topts('円')});
  // 累計ブランド別（2025 vs 2026）
  const rbds=active.flatMap((b,i)=>[
    {label:b+' 2025',data:months.map(k=>{const r=allData[k].ruikei.find(row=>row.name===b);return r?r.y2025:null;}),borderColor:COLORS[i%7],backgroundColor:'transparent',tension:.3,fill:false,pointRadius:3,borderDash:[4,3],borderWidth:1.5},
    {label:b+' 2026',data:months.map(k=>{const r=allData[k].ruikei.find(row=>row.name===b);return r?r.y2026:null;}),borderColor:COLORS[i%7],backgroundColor:'transparent',tension:.3,fill:false,pointRadius:4,borderWidth:2.5}
  ]);
  mc('tr-brand-rui',{type:'line',data:{labels,datasets:rbds},options:topts('円')});
}

function renderTrendFilter(brands){
  const el=document.getElementById('trend-brand-filter');
  if(!brands.length){el.innerHTML='';return;}
  el.innerHTML='<span style="font-size:12px;color:var(--text3);margin-right:4px">表示ブランド：</span>'+
    brands.map(b=>`<button class="brand-chip${activeTrendBrands.size===0||activeTrendBrands.has(b)?' active':''}" onclick="toggleBrand('${b}',this)">${b}</button>`).join('');
}

function toggleBrand(name,el){
  if(activeTrendBrands.has(name)){activeTrendBrands.delete(name);el.classList.remove('active');}
  else{activeTrendBrands.add(name);el.classList.add('active');}
  renderTrend();
}

// BRAND
function renderBrand(){
  const el=document.getElementById('brand-content');
  const months=sortedMonths();
  if(!months.length){el.innerHTML='<div class="empty-state"><div class="emoji">🏷️</div><p style="color:var(--text3)">データなし</p></div>';return;}
  el.innerHTML=`<div class="chart-card"><div class="chart-head"><span class="chart-title">ブランド別 累計売上構成（最新月・2026年）</span></div><div class="chart-wrap" style="height:260px"><canvas id="br-pie"></canvas></div></div>
  <div class="chart-card"><div class="chart-head"><span class="chart-title">ブランド別 累計達成率（最新月）</span></div><div class="chart-wrap" style="height:240px"><canvas id="br-ach"></canvas></div></div>`;
  const latest=allData[months[months.length-1]];
  // ブランド名で重複除去（先頭の行を採用）
  const dedup=arr=>{const seen=new Set();return arr.filter(r=>{const k=r.name;if(seen.has(k))return false;seen.add(k);return true;});};
  const pd=dedup(latest.ruikei.filter(r=>!r.name.includes('総')&&r.y2026>0));
  // その他を円グラフのみに追加（総合計との差分）
  const tot=latest.ruikei.find(r=>r.name.includes('総'));
  if(tot){const diff=Math.round((tot.y2026||0)-pd.reduce((s,d)=>s+d.y2026,0));if(diff>100)pd.push({name:'その他',y2026:diff});}
  const total=pd.reduce((s,d)=>s+d.y2026,0);
  mc('br-pie',{type:'doughnut',data:{labels:pd.map(d=>d.name),datasets:[{data:pd.map(d=>d.y2026),backgroundColor:COLORS,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{
    legend:{position:'right',labels:{font:{size:12},boxWidth:12}},
    tooltip:{callbacks:{label:c=>' '+c.label+': '+c.raw.toLocaleString('ja-JP')+'円 ('+(total>0?(c.raw/total*100).toFixed(1):'0')+'%)'}},
    datalabels:{display:true,color:'#fff',font:{size:11,weight:'bold'},formatter:(v,ctx)=>{const pct=(v/total*100);if(pct<5)return'';const name=ctx.chart.data.labels[ctx.dataIndex];return name+'\n'+pct.toFixed(1)+'%';},textShadowColor:'rgba(0,0,0,0.3)',textShadowBlur:3}
  }}});
  const ad=dedup(latest.ruikei.filter(r=>!r.name.includes('総')&&r.ach!=null));
  mc('br-ach',{type:'bar',data:{labels:ad.map(d=>d.name),datasets:[{label:'達成率',data:ad.map(d=>d.ach),backgroundColor:ad.map(d=>d.ach>=100?'#52c89a':d.ach>=80?'#f5c542':'#e87070'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' 達成率: '+c.raw.toFixed(1)+'%'}},datalabels:{display:true,anchor:'end',align:'end',formatter:v=>v!=null?v.toFixed(1)+'%':'',font:{size:11,weight:'bold'},color:'#5a5950'}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:11},color:'#97958e'},grid:{color:'rgba(0,0,0,0.05)'},min:0},x:{ticks:{font:{size:12}},grid:{display:false}}}}});
}

// ROUTING
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
}

function switchView(id,btn){
  const parent=btn.closest('.view-tabs').parentElement;
  parent.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  parent.querySelectorAll('.view-section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ページ起動時に保存データを表示
if(Object.keys(allData).length>0)renderAll();
updateDataStatus();
updateTokenStatus();
</script>
</body>
</html>
